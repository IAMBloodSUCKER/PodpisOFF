spring:
  application:
    name: podpisoff-backend
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-change-me-please-32bytes}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  yookassa:
    shop-id: ${YOOKASSA_SHOP_ID:}
    secret-key: ${YOOKASSA_SECRET_KEY:}
  dev:
    admin-usernames: ${DEV_ADMIN_USERNAMES:admin123}
  admin:
    panel-key: ${ADMIN_PANEL_KEY:podpisoff-admin-dev-key}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:reminders@podpisoff.app}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
    webhook-public-url: ${TELEGRAM_WEBHOOK_PUBLIC_URL:}
  push:
    public-key: ${PUSH_VAPID_PUBLIC_KEY:BH-r4jf-rihrdfTL4HsC0D_6bHrEYejocbbkOlfgmYfPlhsVGLGhKQP8hM5lk8kbq8_iWvNw4O7injheoP_K5f4}
    private-key: ${PUSH_VAPID_PRIVATE_KEY:XWPul2Sj58s18ZKo40fsyjuGOFym_487cvDmllbhvog}
    subject: ${PUSH_VAPID_SUBJECT:mailto:support@podpisoff.app}
