services:
  postgres:
    image: postgres:16-alpine
    container_name: podpisoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: podpisoff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d podpisoff"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podpisoff-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/podpisoff
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-please-change-me-please-change-me-please-32bytes
      JWT_EXPIRATION_SECONDS: 86400
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: podpisoff-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
