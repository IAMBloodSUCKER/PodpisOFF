name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make mvnw executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Build backend
        working-directory: backend
        run: ./mvnw -B clean package

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend Docker image
        run: docker build -t podpisoff-backend:${{ github.ref_name }} ./backend

      - name: Build frontend Docker image
        run: docker build -t podpisoff-frontend:${{ github.ref_name }} ./frontend

      - name: Export Docker images as artifacts
        run: |
          docker save podpisoff-backend:${{ github.ref_name }} -o podpisoff-backend-${{ github.ref_name }}.tar
          docker save podpisoff-frontend:${{ github.ref_name }} -o podpisoff-frontend-${{ github.ref_name }}.tar

      - name: Upload backend Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: podpisoff-backend-image-${{ github.ref_name }}
          path: podpisoff-backend-${{ github.ref_name }}.tar

      - name: Upload frontend Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: podpisoff-frontend-image-${{ github.ref_name }}
          path: podpisoff-frontend-${{ github.ref_name }}.tar

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            {
              echo "## Changelog"
              echo
              git log --pretty=format:"- %h %s (%an)" "${PREVIOUS_TAG}..${GITHUB_REF_NAME}"
            } > CHANGELOG.md
          else
            {
              echo "## Changelog"
              echo
              git log --pretty=format:"- %h %s (%an)"
            } > CHANGELOG.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            podpisoff-backend-${{ github.ref_name }}.tar
            podpisoff-frontend-${{ github.ref_name }}.tar
